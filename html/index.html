<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dei Progress Bar</title>
    <link rel="stylesheet" href="assets/css/themes.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-theme="dark" style="background:transparent!important">

    <!-- Linear Progress Bar -->
    <div id="progress-linear" class="progress-container progress-linear hidden">
        <div class="progress-header">
            <span class="progress-label"></span>
            <span class="progress-percent">0%</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill">
                <div class="progress-shimmer"></div>
            </div>
        </div>
        <div class="progress-cancel hidden">Presiona [X] para cancelar</div>
    </div>

    <!-- Circular Progress Bar -->
    <div id="progress-circular" class="progress-container progress-circular hidden">
        <div class="circular-card">
            <div class="circular-svg-wrap">
                <svg class="circular-svg" viewBox="0 0 120 120">
                    <circle class="circular-bg-ring" cx="60" cy="60" r="52" />
                    <circle class="circular-fill-ring" cx="60" cy="60" r="52" />
                </svg>
                <div class="circular-center">
                    <div class="circular-icon hidden"></div>
                    <div class="circular-percent">0%</div>
                </div>
            </div>
            <div class="circular-label"></div>
            <div class="progress-cancel hidden">Presiona [X] para cancelar</div>
        </div>
    </div>

    <!-- Mini Progress Bar -->
    <div id="progress-mini" class="progress-container progress-mini hidden">
        <div class="mini-header">
            <span class="progress-label"></span>
            <span class="progress-percent">0%</span>
        </div>
        <div class="progress-track mini-track">
            <div class="progress-fill">
                <div class="progress-shimmer"></div>
            </div>
        </div>
    </div>

    <!-- Semicircle Progress Bar -->
    <div id="progress-semicircle" class="progress-container progress-semicircle hidden">
        <div class="semicircle-card">
            <div class="semicircle-svg-wrap">
                <svg class="semicircle-svg" viewBox="0 0 200 110">
                    <path class="semicircle-bg-arc" d="M 10 100 A 90 90 0 0 1 190 100" />
                    <path class="semicircle-fill-arc" d="M 10 100 A 90 90 0 0 1 190 100" />
                </svg>
                <div class="semicircle-center">
                    <div class="semicircle-percent">0%</div>
                </div>
            </div>
            <div class="semicircle-label"></div>
            <div class="progress-cancel hidden">Presiona [X] para cancelar</div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
